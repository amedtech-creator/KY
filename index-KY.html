<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>KY 주문시스템 로그인</title>
  <style>
    :root{--ky:#d97706;--blue:#2563eb;--red:#ef4444;--green:#16a34a;--gray:#6b7280;--border:#fde68a;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:linear-gradient(135deg,#fffbeb 0%,#fef3c7 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
    .card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(217,119,6,.15);width:100%;max-width:360px;padding:36px 32px;}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
    .logo-icon{width:52px;height:52px;background:var(--ky);border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:1.1rem;}
    .logo-text{font-size:1.2rem;font-weight:800;color:#111;}
    .logo-sub{font-size:.75rem;color:var(--gray);}
    label{display:block;font-size:.8rem;font-weight:600;color:#374151;margin-bottom:6px;}
    .field{margin-bottom:14px;}
    input[type=email],input[type=password],input[type=text]{width:100%;padding:12px 14px;border:1.5px solid #fde68a;border-radius:10px;font-size:.95rem;outline:none;transition:border .2s;}
    input:focus{border-color:var(--ky);}
    .btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
    .btn-primary{background:var(--ky);color:#fff;}
    .btn-secondary{background:#f3f4f6;color:#374151;margin-top:8px;}
    .msg{font-size:.82rem;text-align:center;margin-top:10px;min-height:18px;}
    .msg.error{color:var(--red);}
    .msg.success{color:var(--green);}
    .divider{border:none;border-top:1px solid #f0f0f0;margin:18px 0;}
    #verifyBox{display:none;}
    .hint{font-size:.75rem;color:var(--gray);text-align:center;margin-top:6px;}
    .remember-row{display:flex;align-items:center;gap:6px;margin-bottom:14px;}
    .remember-row input{width:auto;}
    .remember-row label{margin:0;font-weight:400;color:var(--gray);font-size:.82rem;}
    .forgot-link{display:block;text-align:center;font-size:.78rem;color:var(--ky);cursor:pointer;margin-top:12px;text-decoration:underline;}
    .otp-input{font-size:1.4rem!important;font-weight:800!important;letter-spacing:8px!important;text-align:center!important;}
    .btn.loading{opacity:.6;cursor:not-allowed;position:relative}
    .btn.loading::after{content:'';position:absolute;top:50%;left:50%;width:16px;height:16px;margin-top:-8px;margin-left:-8px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn.loading .btn-text{opacity:0}
  </style>
  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">KY</div>
    <div>
      <div class="logo-text">KY 주문시스템</div>
      <div class="logo-sub">이메일 + 코드번호로 로그인</div>
    </div>
  </div>

  <!-- 1단계: 이메일 + 코드번호 -->
  <div id="loginBox">
    <div class="field">
      <label>이메일 주소</label>
      <input type="email" id="email" placeholder="example@naver.com" autocomplete="email">
    </div>
    <div class="field">
      <label>코드번호</label>
      <input type="password" id="pw" placeholder="코드번호 입력" autocomplete="off"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="remember-row">
      <input type="checkbox" id="rememberMe" checked>
      <label for="rememberMe">이 기기에서 자동 로그인</label>
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()"><span class="btn-text">로그인</span></button>
    <div class="msg" id="loginMsg"></div>
    <span class="forgot-link" onclick="forgotCode()">코드번호를 잊으셨나요?</span>
  </div>

  <!-- 2단계: 이메일 인증 (새 기기) -->
  <div id="verifyBox">
    <div style="text-align:center;margin-bottom:18px">
      <div style="font-size:2.5rem">📧</div>
      <div style="font-weight:700;font-size:1rem;margin-top:8px">기기 인증</div>
      <div style="font-size:.82rem;color:var(--gray);margin-top:6px" id="verifyDesc"></div>
    </div>
    <div class="field">
      <label>인증코드 (6자리)</label>
      <input type="text" id="otpInput" class="otp-input" placeholder="000000" maxlength="6" inputmode="numeric"
        onkeydown="if(event.key==='Enter')verifyOtp()">
    </div>
    <button class="btn btn-primary" id="verifyBtn" onclick="verifyOtp()"><span class="btn-text">인증 확인</span></button>
    <button class="btn btn-secondary" onclick="resendOtp()">재발송</button>
    <div class="msg" id="verifyMsg"></div>
    <div class="hint" id="verifyTimer"></div>
    <hr class="divider">
    <button class="btn btn-secondary" onclick="backToLogin()">← 돌아가기</button>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB_CFG = {
  apiKey: "AIzaSyC2jfTHmaguOS9e_ddTvicUZJcvXzQ7EKI",
  authDomain: "amt-ky.firebaseapp.com",
  projectId: "amt-ky",
  storageBucket: "amt-ky.firebasestorage.app",
  messagingSenderId: "1082363760608",
  appId: "1:1082363760608:web:ac27fa51dc23cb603ee585",
  databaseURL: "https://amt-ky-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const ADMINS      = { 'kyunghoyou@gmail.com':'super', 'amedtech@gmail.com':'admin' };
const SESSION_KEY = 'ky_auth_session';
const SAVED_EMAIL = 'ky_saved_email';
const SAVED_CODE  = 'ky_saved_code';  // ★ 자동로그인용 저장 코드 (DB와 대조 검증)
const AUTOLOGIN_KEY = 'ky_autologin_ok';  // ★ 자동로그인 동의 여부

const app  = getApps().find(a=>a.name==='ky-order') || initializeApp(FB_CFG,'ky-order');
const db   = getDatabase(app);

let _pendingEmail='', _pendingRole='', _pendingCode='', _pendingOtpCode='', _otpExpiry=0, _timerInterval=null;

// ─── 이메일 + 코드를 DB에서 검증 ──────────────────────────
// 관리자: amt_admins (주 경로 - 이메일+코드) → fallback amt_pw (이름:코드 맵)
// 대리점: amt_data/dealers[].email + .code 매칭
async function verifyCredentials(email, code){
  email = (email||'').toLowerCase().trim();
  code = (code||'').trim();
  if(!email || !code) return { ok:false, reason:'empty' };

  // 1) 관리자 검증
  if(ADMINS[email]){
    // 1-a) amt_admins에서 이메일로 직접 찾기 (주 저장소)
    try{
      const key = btoa(email).replace(/[^a-zA-Z0-9]/g,'_');
      const snap = await get(ref(db,'amt_admins/'+key));
      if(snap.exists()){
        const adm = snap.val();
        if(String(adm.code||'') === code){
          return { ok:true, role:adm.role||ADMINS[email], name:adm.name||'', email };
        }
        return { ok:false, reason:'admin_code_mismatch' };
      }
    }catch(e){ console.warn('amt_admins 조회 실패', e); }
    // 1-b) fallback: amt_pw (기존 이름:코드 맵)
    try{
      const snap = await get(ref(db,'amt_pw'));
      if(snap.exists()){
        const pwMap = snap.val() || {};
        const matched = Object.entries(pwMap).find(([name, pw]) => String(pw) === code);
        if(matched) return { ok:true, role:ADMINS[email], name:matched[0], email };
      }
    }catch(e){ console.warn('amt_pw 조회 실패', e); }
    return { ok:false, reason:'admin_code_mismatch' };
  }

  // 2) 대리점 검증 - amt_data/dealers에서 이메일+code 매칭
  try{
    const snap = await get(ref(db,'amt_data/dealers'));
    if(!snap.exists()) return { ok:false, reason:'no_dealers' };
    const dealers = snap.val() || [];
    const dealerList = Array.isArray(dealers) ? dealers : Object.values(dealers);
    const dealer = dealerList.find(d => d && (d.email||'').toLowerCase() === email);
    if(!dealer) return { ok:false, reason:'email_not_found' };
    if(String(dealer.code||'') !== code) return { ok:false, reason:'dealer_code_mismatch' };
    return { ok:true, role:'dealer', dealer, email };
  }catch(e){
    console.warn('dealers 조회 실패', e);
    return { ok:false, reason:'db_error', message:e.message };
  }
}

// ─── 저장된 이메일 자동입력 + 자동로그인 시도 ────────────
(async function restoreAndAutoLogin(){
  const em = localStorage.getItem(SAVED_EMAIL)||'';
  if(em) document.getElementById('email').value = em;

  // 자동로그인 시도 (저장된 이메일 + 코드가 있고 동의했으면)
  const savedCode = localStorage.getItem(SAVED_CODE)||'';
  const autoOk = localStorage.getItem(AUTOLOGIN_KEY) === '1';
  if(!em || !savedCode || !autoOk) return;

  // DB와 대조 — 코드가 일치하는 경우에만 자동로그인 진행
  showMsg('loginMsg','🔐 자동 로그인 확인 중...','');
  const res = await verifyCredentials(em, savedCode);
  if(!res.ok){
    // 저장된 코드가 서버 코드와 다름 → 자동로그인 취소, 저장 코드 삭제, 사용자가 직접 입력하도록
    localStorage.removeItem(SAVED_CODE);
    localStorage.removeItem(AUTOLOGIN_KEY);
    showMsg('loginMsg','⚠️ 코드번호가 변경됐습니다. 새 코드를 입력하세요','error');
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
    return;
  }
  // 통과 → 바로 세션 저장 후 이동
  const sess = { email:em, role:res.role, name:res.name||'', dealerId:res.dealer?.id||'' };
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(sess));
  showMsg('loginMsg','✅ 자동 로그인 완료! 이동 중...','success');
  setTimeout(()=>{
    location.replace(res.role==='dealer' ? 'orders-KY.html' : 'orders-admin-KY.html');
  }, 300);
})();

// ─── 로그인 (이메일 + 코드) ──────────────────────────────
window.doLogin = async () => {
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('pw').value.trim();
  if(!email||!pw){ showMsg('loginMsg','이메일과 코드번호를 입력하세요','error'); return; }

  const btn = document.getElementById('loginBtn');
  btn.classList.add('loading');
  btn.disabled = true;
  showMsg('loginMsg','🔐 인증 중...','');

  const res = await verifyCredentials(email, pw);
  if(!res.ok){
    btn.classList.remove('loading');
    btn.disabled = false;
    let msg = '❌ 이메일 또는 코드번호가 틀립니다';
    if(res.reason==='no_dealers') msg = '❌ 대리점 데이터 없음 - 관리자에게 문의';
    if(res.reason==='db_error') msg = '❌ 서버 오류: '+(res.message||'');
    showMsg('loginMsg', msg, 'error');
    return;
  }

  // 검증 통과 → OTP 단계로 (새 기기는 OTP, 이전에 이 기기에서 로그인한 이력이 있으면 건너뜀)
  _pendingEmail = email.toLowerCase();
  _pendingRole = res.role;
  _pendingCode = pw;
  _pendingDealerInfo = res.dealer || null;
  _pendingAdminName = res.name || '';

  // 이 기기에서 이 이메일로 과거에 OTP 인증을 완료한 적 있으면 바로 통과
  const deviceOk = localStorage.getItem('ky_device_verified_'+btoa(email.toLowerCase()).replace(/=/g,'')) === '1';
  if(deviceOk){
    // 바로 통과
    await finalizeLogin(false);
    return;
  }
  // OTP 발송
  await sendOtp(_pendingEmail, _pendingRole);
};
let _pendingDealerInfo = null;
let _pendingAdminName = '';

async function finalizeLogin(fromOtp){
  // ★ 세션 저장
  const sess = {
    email: _pendingEmail,
    role: _pendingRole,
    name: _pendingAdminName,
    dealerId: _pendingDealerInfo?.id || ''
  };
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(sess));

  // ★ 이메일/코드 저장 (자동로그인 동의한 경우에만)
  const remember = document.getElementById('rememberMe').checked;
  if(remember){
    localStorage.setItem(SAVED_EMAIL, _pendingEmail);
    localStorage.setItem(SAVED_CODE, _pendingCode);
    localStorage.setItem(AUTOLOGIN_KEY, '1');
    if(fromOtp){
      // OTP 통과한 기기는 "신뢰된 기기"로 마크 → 다음 로그인부턴 OTP 건너뜀
      localStorage.setItem('ky_device_verified_'+btoa(_pendingEmail).replace(/=/g,''), '1');
    }
  } else {
    localStorage.removeItem(SAVED_CODE);
    localStorage.removeItem(AUTOLOGIN_KEY);
  }

  const msgId = fromOtp ? 'verifyMsg' : 'loginMsg';
  showMsg(msgId, '✅ 인증 완료! 이동 중...', 'success');
  setTimeout(()=>{
    location.replace(_pendingRole==='dealer' ? 'orders-KY.html' : 'orders-admin-KY.html');
  }, 500);
}

// ─── OTP 생성 및 발송 ─────────────────────────────────────
async function sendOtp(email, role) {
  document.getElementById('loginBox').style.display  = 'none';
  document.getElementById('verifyBox').style.display = 'block';
  document.getElementById('otpInput').value = '';
  document.getElementById('verifyDesc').textContent = '📤 인증코드 발송 중...';

  const code = String(Math.floor(100000+Math.random()*900000));
  _pendingOtpCode = code;
  _otpExpiry      = Date.now() + 5*60*1000;

  // DB 저장
  try{
    await set(ref(db,'amt_otp/'+btoa(email).replace(/=/g,'')), {code, expiry:_otpExpiry, email});
  }catch(e){ console.warn('OTP 저장 실패',e); }

  // 이메일로 OTP 발송 (EmailJS)
  let sent = false;
  try{
    const snap = await get(ref(db,'config/emailjs'));
    if(snap.exists()){
      const cfg = snap.val();
      if(cfg.serviceId && cfg.templateId){
        if(cfg.publicKey) emailjs.init(cfg.publicKey);
        const res = await emailjs.send(cfg.serviceId, cfg.templateId, {
          to_email: email,
          otp_code: code,
          app_name: 'KY 주문시스템',
          valid_minutes: '5'
        });
        if(res.status === 200) sent = true;
      }
    }
  }catch(e){ console.warn('이메일 발송 실패',e); }

  document.getElementById('verifyDesc').textContent =
    sent ? `✉️ ${email} 로 인증코드를 발송했습니다`
         : `⚠️ 이메일 발송 실패 - 개발자도구에 코드 표시: ${code}`;
  startOtpTimer();
}

// ─── OTP 검증 ─────────────────────────────────────────────
window.verifyOtp = async () => {
  const input = document.getElementById('otpInput').value.trim();
  if(!input){ showMsg('verifyMsg','코드를 입력하세요','error'); return; }
  if(Date.now()>_otpExpiry){ showMsg('verifyMsg','만료됐습니다. 재발송하세요','error'); return; }

  const vbtn = document.getElementById('verifyBtn');
  vbtn.classList.add('loading');
  vbtn.disabled = true;
  showMsg('verifyMsg','🔐 검증 중...','');

  let ok = false;
  try{
    const snap = await get(ref(db,'amt_otp/'+btoa(_pendingEmail).replace(/=/g,'')));
    const s = snap.val();
    ok = s && s.code===input && Date.now()<=s.expiry;
  }catch(e){ ok = input===_pendingOtpCode; }

  if(!ok){
    vbtn.classList.remove('loading');
    vbtn.disabled = false;
    showMsg('verifyMsg','❌ 코드가 틀리거나 만료됐습니다','error');
    return;
  }

  clearInterval(_timerInterval);
  set(ref(db,'amt_otp/'+btoa(_pendingEmail).replace(/=/g,'')),null).catch(()=>{});
  await finalizeLogin(true);
};

window.resendOtp = async ()=>{ if(_pendingEmail) await sendOtp(_pendingEmail, _pendingRole); };
window.backToLogin = ()=>{
  clearInterval(_timerInterval);
  document.getElementById('loginBox').style.display  = 'block';
  document.getElementById('verifyBox').style.display = 'none';
  document.getElementById('otpInput').value = '';
  const loginBtn = document.getElementById('loginBtn');
  if(loginBtn){ loginBtn.classList.remove('loading'); loginBtn.disabled = false; }
};

// ─── 코드 잊어버린 경우 - 텔레그램 + 관리자 앱 팝업 둘 다 ──
window.forgotCode = async () => {
  const email = document.getElementById('email').value.trim();
  if(!email){ showMsg('loginMsg','이메일을 먼저 입력하세요','error'); return; }

  const reqId = 'cr_' + Date.now();
  const nowIso = new Date().toISOString();
  let notifOk = false, telegramOk = false;

  // 1) Firebase amt_notifications에 코드요청 알림 기록 (관리자 앱 팝업용)
  try{
    await set(ref(db,'amt_notifications/'+reqId), {
      id: reqId,
      type: 'code_request',   // ★ orders-admin-AMT의 리스너가 type 필드를 체크함
      title: '🔑 코드번호 재설정 요청',
      message: '[코드요청] '+email+' 계정 코드번호 재설정 요청',
      email,
      app: 'KY',
      at: nowIso,
      read: false
    });
    notifOk = true;
  }catch(e){ console.warn('알림 저장 실패', e); }

  // 2) 텔레그램 발송
  try{
    const snap = await get(ref(db,'config/telegram'));
    if(snap.exists()){
      const cfg = snap.val();
      const token = cfg.superAdminToken || cfg.botToken;
      const chatId = cfg.superAdminChatId || cfg.chatId;
      if(token && chatId){
        const text = `🔑 [KY 코드요청] ${email}\n계정 코드번호 재설정 요청이 들어왔습니다.\n(${new Date().toLocaleString('ko-KR')})`;
        const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({chat_id:chatId,text})
        });
        telegramOk = res.ok;
      }
    }
  }catch(e){ console.warn('텔레그램 실패', e); }

  if(notifOk || telegramOk){
    const parts = [];
    if(notifOk) parts.push('관리자 앱');
    if(telegramOk) parts.push('텔레그램');
    showMsg('loginMsg','✅ '+parts.join('+')+'으로 알림 전송 완료','success');
  } else {
    showMsg('loginMsg','❌ 알림 전송 실패 - 관리자에게 직접 연락하세요','error');
  }
};

function startOtpTimer(){
  clearInterval(_timerInterval);
  const el=document.getElementById('verifyTimer');
  _timerInterval=setInterval(()=>{
    const left=Math.max(0,Math.floor((_otpExpiry-Date.now())/1000));
    const m=Math.floor(left/60),s=left%60;
    el.textContent=left>0?`남은 시간: ${m}:${String(s).padStart(2,'0')}`:'인증코드가 만료됐습니다';
    if(left===0) clearInterval(_timerInterval);
  },1000);
}

function showMsg(id,text,type){
  const el=document.getElementById(id);
  el.textContent=text;
  el.className='msg'+(type?' '+type:'');
}
</script>
</body>
</html>
