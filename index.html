<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KY 대리점 로그인</title>
    <style>
        body { font-family: sans-serif; background: #fff7ed; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ea580c; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h2>KY 대리점 로그인</h2>
    <input type="email" id="uEmail" placeholder="이메일">
    <input type="password" id="uPw" placeholder="비밀번호">
    <button onclick="doLogin()">로그인</button>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    const firebaseConfig = {
        apiKey: "AIzaSyC2jfTHmaguOS9e_ddTvicUZJcvXzQ7EKI",
        authDomain: "amt-ky.firebaseapp.com",
        projectId: "amt-ky",
        storageBucket: "amt-ky.firebasestorage.app",
        messagingSenderId: "1082363760608",
        appId: "1:1082363760608:web:ac27fa51dc23cb603ee585"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const ADMINS = ['kyunghoyou@gmail.com', 'amedtech@gmail.com'];
    window.doLogin = () => {
        const email = document.getElementById('uEmail').value;
        const pw = document.getElementById('uPw').value;
        signInWithEmailAndPassword(auth, email, pw).catch(e => alert("정보가 틀립니다."));
    };
    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (ADMINS.includes(user.email)) location.replace("orders-admin-ky.html");
            else if (user.email === 'ykhymj2@naver.com') location.replace("index-ky.html");
        }
    });
</script>
</body>
</html>
