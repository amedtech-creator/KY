<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KY-Order · 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0284c7; --bg: #f0f9ff; --text: #075985; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .login-card { background: #fff; padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(2,132,199,0.1); width: 100%; max-width: 380px; text-align: center; }
        .logo-icon { width: 64px; height: 64px; background: var(--blue); color: #fff; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; margin: 0 auto 20px; }
        h2 { font-size: 1.4rem; font-weight: 900; color: var(--text); margin-bottom: 8px; }
        p { font-size: 0.9rem; color: #64748b; margin-bottom: 30px; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; font-weight: 700; }
        input:focus { border-color: var(--blue); }
        button { width: 100%; padding: 15px; background: var(--blue); color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0369a1; }
        #errorMsg { color: #e11d48; font-size: 0.85rem; margin-top: 15px; font-weight: 600; }
        .loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loader" class="loading"><div style="font-weight:900; color:var(--blue);">인증 중...</div></div>

<div class="login-card">
    <div class="logo-icon">KY</div>
    <h2>대리점 주문 시스템</h2>
    <p>등록된 계정으로 로그인하세요.</p>
    <input type="email" id="uEmail" placeholder="이메일 주소">
    <input type="password" id="uPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter') doLogin()">
    <button onclick="doLogin()">로그인</button>
    <div id="errorMsg"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC2jfTHmaguOS9e_ddTvicUZJcvXzQ7EKI",
        authDomain: "amt-ky.firebaseapp.com",
        databaseURL: "https://amt-ky-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "amt-ky",
        storageBucket: "amt-ky.firebasestorage.app",
        messagingSenderId: "1082363760608",
        appId: "1:1082363760608:web:ac27fa51dc23cb603ee585"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const ADMINS = ['kyunghoyou@gmail.com', 'amedtech@gmail.com'];

    window.doLogin = async () => {
        const email = document.getElementById('uEmail').value.trim();
        const pw = document.getElementById('uPw').value;
        if(!email || !pw) return;
        document.getElementById('loader').style.display = "flex";

        try {
            await signInWithEmailAndPassword(auth, email, pw);
        } catch (e) {
            document.getElementById('loader').style.display = "none";
            document.getElementById('errorMsg').innerText = "계정 정보가 올바르지 않습니다.";
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (ADMINS.includes(user.email)) {
                // 관리자면 orders-admin-ky.html로 이동
                location.replace("orders-admin-ky.html");
            } else if (user.email === 'ykhymj2@naver.com') {
                // 대리점이면 index-ky.html로 이동
                location.replace("index-ky.html");
            } else {
                alert("권한이 없는 계정입니다.");
                auth.signOut();
                location.reload();
            }
        } else {
            document.getElementById('loader').style.display = "none";
        }
    });
</script>
</body>
</html>
